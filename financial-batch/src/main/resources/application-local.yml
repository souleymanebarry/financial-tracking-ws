server:
  port: 8090  # Port dédié pour éviter le conflit avec financial-api (8080)

# =========================
# Batch scheduling (local)
# =========================
batch:
  statement:
    cron: "0 0 1 1 * *"  # Désactivé en local — déclencher manuellement via BatchTriggerController
#   cron: "0 * * * * *"  # Décommenter pour tester le scheduling toutes les minutes

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: bank-statements

spring:
  # =========================
  # DataSource (PostgreSQL)
  # =========================
  datasource:
    url: jdbc:postgresql://localhost:5432/financial-tracking-ws-db
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # =========================
  # Spring Batch
  # =========================
  batch:
    jdbc:
      initialize-schema: always  # Spring Batch crée ses tables metadata (local uniquement)

  # =========================
  # JPA
  # =========================
  jpa:
    show-sql: true

# =========================
# Logging
# =========================
logging:
  level:
    org.springframework.batch: DEBUG
    com.barry.bank.batch: DEBUG
