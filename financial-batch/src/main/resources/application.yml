spring:
  application:
    name: financial-batch

  # =========================
  # Spring Batch
  # =========================
  batch:
    job:
      enabled: false  # Jobs déclenchés via @Scheduled ou JobLauncher — pas au démarrage

  # =========================
  # JPA / Hibernate
  # =========================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50   # = batch.chunk.statement
        order_inserts: true
        order_updates: true

  # =========================
  # Liquibase
  # =========================
  liquibase:
    enabled: false  # Schema métier géré par financial-persistence

# =========================
# Actuator — healthchecks
# =========================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      # Expose /actuator/health/liveness et /actuator/health/readiness
      probes:
        enabled: true

# =========================
# Batch scheduling
# =========================
batch:
  statement:
    cron: "0 0 1 1 * *"  # 1er de chaque mois à 01h00 (surcharger dans application-local.yml)
  chunk:
    statement: 50   # comptes traités par chunk — Step 1
    pdf: 10         # relevés traités par chunk — Step 2

# =========================
# MinIO
# =========================
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: bank-statements
