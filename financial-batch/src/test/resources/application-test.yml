spring:
  # Datasource fourni par Testcontainers via @ServiceConnection (BankStatementJobIT) —
  # aucune URL ni credentials en dur ici.

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  batch:
    jdbc:
      # Tables de métadonnées Spring Batch créées au démarrage (conteneur vierge)
      initialize-schema: always
    job:
      enabled: false

  # Schéma applicatif : changelog Liquibase IT partagé (financial-test-support),
  # le même que celui des ITs de financial-api.
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-it.yaml

batch:
  statement:
    cron: "0 0 1 1 * *"

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: bank-statements