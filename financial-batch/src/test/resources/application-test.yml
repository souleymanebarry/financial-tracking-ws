spring:
  datasource:
    url: jdbc:h2:mem:batchtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  liquibase:
    enabled: false

batch:
  statement:
    cron: "0 0 1 1 * *"
  pdf:
    output-dir: ./target/test-statements
