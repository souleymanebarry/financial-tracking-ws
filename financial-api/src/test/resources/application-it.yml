spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/financial_tracking_ws_it_db_test
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  # Changelog Liquibase dédié aux ITs, indépendant de la prod.
  # drop-first recrée une base vierge à chaque démarrage de contexte Spring.
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-it.yaml
    drop-first: true

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  sql:
    init:
      mode: never

  jackson:
    serialization:
      INDENT_OUTPUT: true

logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: DEBUG
    org.springframework.security: TRACE

archive:
  service:
    url: http://localhost:${wiremock.server.port}

