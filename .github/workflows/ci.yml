name: CI

on:
  push:
    branches: [develop, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR + push develop/master : build + tests (unit + IT Testcontainers), rien n'est publié
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify

      # Rapports JaCoCo (générés en phase test par le parent POM) — informatif, aucun seuil bloquant
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/**"
          if-no-files-found: ignore

  # Tag vX.Y.Z uniquement : jars → GitHub Packages, images api/batch → GHCR
  publish:
    if: github.ref_type == 'tag'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version Maven CI-friendly dérivée du tag vX.Y.Z
      - name: Compute Maven revision
        id: rev
        run: echo "revision=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # server-id "github" = <distributionManagement> du parent POM ;
      # setup-java génère le settings.xml (credentials via GITHUB_ACTOR/GITHUB_TOKEN)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github

      - name: Deploy jars to GitHub Packages
        run: ./mvnw deploy -DskipTests -Drevision=${{ steps.rev.outputs.revision }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (financial-api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/financial-api
          tags: type=semver,pattern={{version}}

      - name: Docker metadata (financial-batch)
        id: meta-batch
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/financial-batch
          tags: type=semver,pattern={{version}}

      # Les deux cibles partagent le stage builder : le second build
      # réutilise les couches du premier via le cache GitHub Actions.
      - name: Build and push financial-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          build-args: REVISION=${{ steps.rev.outputs.revision }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push financial-batch image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: batch
          push: true
          build-args: REVISION=${{ steps.rev.outputs.revision }}
          tags: ${{ steps.meta-batch.outputs.tags }}
          labels: ${{ steps.meta-batch.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max