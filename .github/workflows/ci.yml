name: CI

on:
  push:
    branches: [develop, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

# Jamais annuler un run de release (tag) en cours ; les branches/PR restent annulables
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  # PR + push develop/master : build + tests (unit + IT Testcontainers), rien n'est publié
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write # annotations JUnit dans l'onglet Checks
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Sur un tag vX.Y.Z, verify construit et teste la version exacte qui sera publiée ;
      # sinon on garde la version par défaut du parent POM
      - name: Compute Maven revision
        id: rev
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "revision=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "revision=0.0.1-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and test
        run: ./mvnw -B -ntp clean verify -Drevision=${{ steps.rev.outputs.revision }}

      # Échecs de tests publiés en annotations dans l'onglet Checks — les stacktraces
      # sont lisibles directement dans la PR, sans télécharger l'artifact
      - name: Publish test report annotations
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: |
            **/target/surefire-reports/TEST-*.xml
            **/target/failsafe-reports/TEST-*.xml

      # Rapports surefire/failsafe pour diagnostiquer les tests en échec
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore

      # Rapports JaCoCo (générés en phase test par le parent POM) — informatif, aucun seuil bloquant
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/**"
          if-no-files-found: ignore

  # PR uniquement : échoue si la PR introduit une dépendance avec une vulnérabilité
  # connue (compare le graphe de dépendances base ↔ head via l'API GitHub)
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  # PR + push branches : valide que le Dockerfile construit toujours (rien n'est poussé).
  # Sans ça, un Dockerfile cassé ne serait découvert qu'au moment d'une release.
  # Inutile sur un tag : publish fait le vrai build+push.
  docker-build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Les deux cibles partagent le stage builder : le second build est quasi gratuit
      - name: Build financial-api image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build financial-batch image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: batch
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tag vX.Y.Z uniquement : jars → GitHub Packages, images api/batch → GHCR
  publish:
    if: github.ref_type == 'tag'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # création de la GitHub Release
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Version Maven CI-friendly dérivée du tag vX.Y.Z
      - name: Compute Maven revision
        id: rev
        run: echo "revision=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # server-id "github" = <distributionManagement> du parent POM ;
      # setup-java génère le settings.xml (credentials via GITHUB_ACTOR/GITHUB_TOKEN)
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github

      - name: Deploy jars to GitHub Packages
        run: ./mvnw -B -ntp deploy -DskipTests -Drevision=${{ steps.rev.outputs.revision }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (financial-api)
        id: meta-api
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/financial-api
          tags: type=semver,pattern={{version}}

      - name: Docker metadata (financial-batch)
        id: meta-batch
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/financial-batch
          tags: type=semver,pattern={{version}}

      # Les deux cibles partagent le stage builder : le second build
      # réutilise les couches du premier via le cache GitHub Actions.
      - name: Build and push financial-api image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: api
          push: true
          provenance: true
          sbom: true
          build-args: REVISION=${{ steps.rev.outputs.revision }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push financial-batch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: batch
          push: true
          provenance: true
          sbom: true
          build-args: REVISION=${{ steps.rev.outputs.revision }}
          tags: ${{ steps.meta-batch.outputs.tags }}
          labels: ${{ steps.meta-batch.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # En dernier : la Release n'est créée que si jars et images ont bien été publiés.
      # --generate-notes : notes générées depuis les commits/PR depuis le tag précédent.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
