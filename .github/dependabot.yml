version: 2
updates:
  # Maintient les actions pinnées par SHA (met à jour SHA + commentaire de version)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Dépendances Maven (parent POM + modules du réacteur)
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5