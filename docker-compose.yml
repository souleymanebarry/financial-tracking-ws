services:
  # Backend docker service
  financial-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: financial-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      # application-local.yml écoute sur 8092 (dev sur le poste) : dans le conteneur
      # on force 8080, attendu par le mapping de ports et le healthcheck.
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financial_db
      SPRING_DATASOURCE_USERNAME: financial_user
      SPRING_DATASOURCE_PASSWORD: financial_pass
      # URI complet requis : application-local.yml définit spring.cloud.vault.uri,
      # qui a priorité sur host/port/scheme — seul SPRING_CLOUD_VAULT_URI le surcharge.
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: myroot
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Large : couvre le premier démarrage sur base vierge (migration Liquibase complète)
      start_period: 180s
    restart: on-failure

  # Batch de génération des relevés (PDF → MinIO)
  financial-batch:
    build:
      context: .
      dockerfile: Dockerfile
      target: batch
    container_name: financial-batch
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financial_db
      SPRING_DATASOURCE_USERNAME: financial_user
      SPRING_DATASOURCE_PASSWORD: financial_pass
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  minio:
    image: minio/minio:latest
    container_name: financial-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Seed du Vault dev (stockage en MÉMOIRE, vidé à chaque redémarrage du conteneur) :
  # pousse la clé privée RSA depuis le fichier LOCAL GITIGNORÉ docker/vault/rsa-private-key.pem
  # vers secret/financial-tracking-ws/rsa (clé rsa-private-key), puis se termine.
  # Voir docker/vault/README.md pour déposer la clé.
  vault-init:
    image: hashicorp/vault:latest
    container_name: financial-vault-init
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: myroot
    volumes:
      - ./docker/vault:/seed:ro
    # Attente active : l'ordre depends_on n'est pas garanti hors `docker compose up`
    # (restart du démon Docker, `docker compose restart`), donc on retry jusqu'à ce que Vault réponde.
    entrypoint: ["sh", "-c", "if [ ! -f /seed/rsa-private-key.pem ]; then echo 'ERREUR: docker/vault/rsa-private-key.pem introuvable — voir docker/vault/README.md'; exit 1; fi; until vault status > /dev/null 2>&1; do echo 'waiting for vault...'; sleep 2; done; vault kv put secret/financial-tracking-ws/rsa rsa-private-key=@/seed/rsa-private-key.pem"]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  vault:
    image: hashicorp/vault:latest
    container_name: financial-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres docker service
  postgres:
    image: postgres:12.8
    container_name: financial-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: financial_db
      POSTGRES_USER: financial_user
      POSTGRES_PASSWORD: financial_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial_user -d financial_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
